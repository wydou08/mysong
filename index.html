<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tres de la Mañana</title>

  <link rel="stylesheet"
    href="https://unpkg.com/aplayer/dist/APlayer.min.css"/>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      overflow-x: hidden;

      font-family: Arial, sans-serif;
      color: white;
      background: #0f0f0f;
    }

    /* Blurred fullscreen background */
    .background {
      position: fixed;
      inset: 0;

      background-image: url('./cover.jpg');
      background-size: cover;
      background-position: center;

      filter: blur(40px) brightness(0.25);
      transform: scale(1.2);

      z-index: -2;
    }

    /* Dark overlay */
    .overlay {
      position: fixed;
      inset: 0;

      background:
        linear-gradient(
          to bottom,
          rgba(0,0,0,0.35),
          rgba(0,0,0,0.75)
        );

      z-index: -1;
    }

    .container {
      width: 100%;
      max-width: 500px;

      padding: 24px;
    }

    .cover {
      width: 100%;

      border-radius: 22px;

      box-shadow:
        0 10px 40px rgba(0,0,0,0.5),
        0 0 60px rgba(255,255,255,0.06);

      margin-bottom: 22px;

      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    .title {
      text-align: center;

      font-size: 30px;
      font-weight: bold;

      margin-bottom: 6px;
    }

    .artist {
      text-align: center;

      opacity: 0.7;

      margin-bottom: 24px;

      font-size: 16px;
    }

    #player {
      border-radius: 18px;
      overflow: hidden;
    }

    /* Main player */
    .aplayer {
      background: rgba(20,20,20,0.72) !important;

      backdrop-filter: blur(24px);

      border: 1px solid rgba(255,255,255,0.05) !important;

      color: white !important;

      box-shadow:
        0 8px 32px rgba(0,0,0,0.4);
    }

    /* Remove lyric gradients */
    .aplayer-lrc:before,
    .aplayer-lrc:after {
      display: none !important;
    }

    /* Lyrics container */
    .aplayer-lrc {
      height: 220px !important;

      padding: 20px 10px !important;

      overflow: hidden !important;

      mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        white 12%,
        white 88%,
        transparent 100%
      );
    }

    /* Normal lyric lines */
    .aplayer-lrc p {
      font-size: 15px !important;

      line-height: 1.8 !important;

      color: rgba(255,255,255,0.38) !important;

      margin: 0 !important;

      opacity: 0.8;

      transform: none !important;

      transition:
        color 0.2s ease,
        opacity 0.2s ease;
    }

    /* Current lyric line */
    .aplayer-lrc p.aplayer-lrc-current {
      color: white !important;

      font-size: 15px !important;

      font-weight: 700;

      opacity: 1;

      text-shadow:
        0 0 8px rgba(255,255,255,0.25);
    }

    /* Progress bar */
    .aplayer .aplayer-played {
      background: #ffffff !important;
    }

    .aplayer .aplayer-thumb {
      background: #ffffff !important;
    }

    /* Footer */
    .footer {
      text-align: center;

      margin-top: 18px;

      opacity: 0.45;

      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">

  <img class="cover" src="./cover.jpg">

  <div class="title">
    Tres de la Mañana
  </div>

  <div class="artist">
    Meta AI
  </div>

  <div id="player"></div>

  <div class="footer">
    Montréal, QC
  </div>

</div>

<script src="https://unpkg.com/aplayer/dist/APlayer.min.js"></script>

<script>
const ap = new APlayer({
  container: document.getElementById('player'),

  fixed: false,

  lrcType: 3,

  audio: [{
    name: 'Tres de la Mañana',
    artist: 'Meta AI',
    url: './song.mp3',
    cover: './cover.jpg',
    lrc: './lyrics.lrc'
  }]
});
</script>

</body>
</html>
