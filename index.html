<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tres de la Mañana</title>

  <link rel="stylesheet"
    href="https://unpkg.com/aplayer/dist/APlayer.min.css"/>

  <style>
    body {
      margin: 0;
      background: #121212;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 700px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      opacity: 0.6;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Tres de la Mañana</h1>

  <div id="player"></div>

  <div class="footer">
    
  </div>
</div>

<script src="https://unpkg.com/aplayer/dist/APlayer.min.js"></script>

<script>
const ap = new APlayer({
  container: document.getElementById('player'),

  lrcType: 3,

  audio: [{
    name: 'Tres de la Mañana',
    artist: 'Meta AI',
    url: 'song.mp3',
    cover: 'cover.jpg',
    lrc: 'lyrics.lrc'
  }]
});
</script>

</body>
</html>
